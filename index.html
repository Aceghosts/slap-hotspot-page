<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Slap Hotspot</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #101114;
      font-family: Arial, sans-serif;
      padding: 16px;
      gap: 14px;
    }

    .image-hotspot-container {
      position: relative;
      width: min(100%, 760px);
      line-height: 0;
      touch-action: manipulation;
      user-select: none;
    }

    .background-image {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.38);
    }

    .slap-zone {
      position: absolute;
      top: 36%;
      left: 58.5%;
      width: 30%;
      height: 28%;
      border-radius: 50%;
      background: transparent;
      border: 2px solid transparent;
      cursor: pointer;
      transform: translate(-50%, -50%) scale(1);
      transition: transform 80ms ease, background-color 80ms ease;
      touch-action: manipulation;

      /* After alignment, make the zone invisible with:
         background: transparent;
         border-color: transparent;
      */
    }

    .slap-zone.is-active {
      transform: translate(-50%, -50%) scale(0.9);
      background: rgba(255, 255, 255, 0.72);
    }

    .slap-zone.is-editing {
      background: rgba(255, 0, 0, 0.5);
      border-color: #ffffff;
      cursor: move;
    }

    .controls-panel {
      width: min(100%, 760px);
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 8px;
      background: #1b1d22;
      color: #f4f4f5;
      line-height: 1.3;
    }

    .move-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 700;
    }

    .move-toggle input {
      width: 22px;
      height: 22px;
      accent-color: #ff3b3b;
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .control-row {
      display: grid;
      grid-template-columns: 58px 1fr 52px;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .control-row input {
      width: 100%;
      accent-color: #ff3b3b;
    }

    .control-value {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .nudge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .nudge-row button {
      min-width: 42px;
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      background: #2f333b;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .nudge-row button:active {
      transform: scale(0.96);
      background: #ff3b3b;
    }

    @media (max-width: 620px) {
      .control-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

  <script>
    const slapZone = document.querySelector('.slap-zone');
    const tapSound = document.querySelector('#tapSound');
    const moveMode = document.querySelector('#moveMode');
    const zoneInputs = {
      top: document.querySelector('#zoneTop'),
      left: document.querySelector('#zoneLeft'),
      width: document.querySelector('#zoneWidth'),
      height: document.querySelector('#zoneHeight')
    };
    const zoneValues = {
      top: document.querySelector('#zoneTopValue'),
      left: document.querySelector('#zoneLeftValue'),
      width: document.querySelector('#zoneWidthValue'),
      height: document.querySelector('#zoneHeightValue')
    };
    const defaultZone = {
      top: 36,
      left: 58.5,
      width: 30,
      height: 28
    };
    const zone = { ...defaultZone };
    let tapSequenceId = 0;
    let isDraggingZone = false;

    function resetAudio(audio) {
      audio.pause();
      audio.currentTime = 0;
    }

    function flashZone() {
      slapZone.classList.add('is-active');
      window.setTimeout(() => {
        slapZone.classList.remove('is-active');
      }, 90);
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function formatPercent(value) {
      return `${Number(value).toFixed(1).replace('.0', '')}%`;
    }

    function applyZonePosition() {
      slapZone.style.top = `${zone.top}%`;
      slapZone.style.left = `${zone.left}%`;
      slapZone.style.width = `${zone.width}%`;
      slapZone.style.height = `${zone.height}%`;

      Object.keys(zoneInputs).forEach((key) => {
        zoneInputs[key].value = zone[key];
        zoneValues[key].textContent = formatPercent(zone[key]);
      });
    }

    function setZoneValue(key, value) {
      const min = Number(zoneInputs[key].min);
      const max = Number(zoneInputs[key].max);
      zone[key] = clamp(Number(value), min, max);
      applyZonePosition();
    }

    function playSequence() {
      if (moveMode.checked) {
        return;
      }

      tapSequenceId += 1;
      resetAudio(tapSound);
      tapSound.currentTime = 0;
      tapSound.play();
      flashZone();
    }

    Object.keys(zoneInputs).forEach((key) => {
      zoneInputs[key].addEventListener('input', () => {
        setZoneValue(key, zoneInputs[key].value);
      });
    });

    document.querySelectorAll('[data-nudge-top], [data-nudge-left]').forEach((button) => {
      button.addEventListener('click', () => {
        if (button.dataset.nudgeTop) {
          setZoneValue('top', zone.top + Number(button.dataset.nudgeTop));
        }

        if (button.dataset.nudgeLeft) {
          setZoneValue('left', zone.left + Number(button.dataset.nudgeLeft));
        }
      });
    });

    document.querySelector('#resetZone').addEventListener('click', () => {
      Object.assign(zone, defaultZone);
      applyZonePosition();
    });

    moveMode.addEventListener('change', () => {
      slapZone.classList.toggle('is-editing', moveMode.checked);
    });

    slapZone.addEventListener('pointerdown', (event) => {
      if (!moveMode.checked) {
        return;
      }

      isDraggingZone = true;
      slapZone.setPointerCapture(event.pointerId);
      event.preventDefault();
    });

    slapZone.addEventListener('pointermove', (event) => {
      if (!isDraggingZone || !moveMode.checked) {
        return;
      }

      const box = slapZone.parentElement.getBoundingClientRect();
      setZoneValue('left', ((event.clientX - box.left) / box.width) * 100);
      setZoneValue('top', ((event.clientY - box.top) / box.height) * 100);
    });

    slapZone.addEventListener('pointerup', () => {
      isDraggingZone = false;
    });

    slapZone.addEventListener('pointercancel', () => {
      isDraggingZone = false;
    });

    applyZonePosition();
    slapZone.addEventListener('pointerdown', playSequence);

    slapZone.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        playSequence();
      }
    });
  </script>
